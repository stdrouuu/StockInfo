<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockInfo - Tambahkan Supplier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .backdrop-blur-custom { backdrop-filter: blur(4px); }
    </style>
</head>
<body class="bg-[#f8fafc] text-[#1e293b] overflow-hidden">

    <div class="flex min-h-screen blur-sm pointer-events-none select-none">
        <aside class="w-64 bg-white border-r border-slate-200 flex flex-col h-screen">
            <div class="p-6 flex items-center gap-3">
                <div class="bg-[#1e40af] p-2 rounded-lg text-white">
                    <i class="fas fa-warehouse text-xl"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg leading-tight">StockInfo</h1>
                    <p class="text-[10px] text-slate-400 uppercase tracking-wider font-semibold">Warehouse Admin</p>
                </div>
            </div>
            <nav class="flex-1 px-4 space-y-1 mt-4">
                <div class="flex items-center gap-3 px-4 py-3 text-slate-500 rounded-xl"><i class="fas fa-th-large w-5"></i> Dashboard</div>
                <div class="flex items-center gap-3 px-4 py-3 text-slate-500 rounded-xl"><i class="fas fa-box w-5"></i> Data Produk</div>
                <div class="flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-600 rounded-xl"><i class="fas fa-user-friends w-5"></i> Supplier</div>
            </nav>
        </aside>
        <main class="flex-1 p-8 bg-slate-100">
            <div class="bg-white rounded-3xl h-full w-full border border-slate-200"></div>
        </main>
    </div>

    <div class="fixed inset-0 bg-black/40 backdrop-blur-custom z-50 flex items-center justify-center p-4">
        
        <div class="bg-white w-full max-w-2xl rounded-[32px] shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
            <div class="p-8 md:p-10">
                
                <h2 class="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] mb-8">
                    Tambahkan Supplier
                </h2>
                
                <form action="#" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-800 uppercase tracking-widest block ml-1">
                                Nama Supplier
                            </label>
                            <input 
                                type="text" 
                                value="PT. Rimba Jaya Abadi"
                                class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-700 font-medium focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all"
                            >
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-800 uppercase tracking-widest block ml-1">
                                Kontak Person
                            </label>
                            <input 
                                type="text" 
                                value="Bapak Hendra Setiawan"
                                class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-700 font-medium focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all"
                            >
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-800 uppercase tracking-widest block ml-1">
                                No Telepon
                            </label>
                            <input 
                                type="text" 
                                value="021-5558901"
                                class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-700 font-medium focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all"
                            >
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-800 uppercase tracking-widest block ml-1">
                                Alamat
                            </label>
                            <textarea 
                                rows="1"
                                class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-700 font-medium focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all resize-none"
                            >Jl. Industri Kayu No. 12, Kalideres, Jakarta Barat</textarea>
                        </div>

                    </div>

                    <div class="flex items-center justify-end gap-3 pt-6">
                        <button 
                            type="button" 
                            class="px-10 py-3 bg-slate-100 hover:bg-slate-200 text-slate-800 text-sm font-bold rounded-xl transition-colors"
                        >
                            Batal
                        </button>
                        <button 
                            type="submit" 
                            class="px-10 py-3 bg-[#2d46b9] hover:bg-blue-800 text-white text-sm font-bold rounded-xl shadow-lg shadow-blue-200 transition-all"
                        >
                            Simpan
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>

</body>
</html>
