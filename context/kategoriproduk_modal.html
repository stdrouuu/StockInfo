<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockInfo - Modal Kategori</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#f8fafc]">

    <div class="flex min-h-screen">
        <aside class="w-64 bg-white border-r border-slate-200 flex flex-col fixed h-screen z-0 opacity-40 blur-[2px]">
            <div class="p-6 flex items-center gap-3">
                <div class="bg-[#1e40af] p-2 rounded-lg text-white"><i class="fas fa-warehouse text-xl"></i></div>
                <div>
                    <h1 class="font-bold text-lg">StockInfo</h1>
                    <p class="text-[10px] text-slate-400 uppercase font-semibold">Warehouse Admin</p>
                </div>
            </div>
            <nav class="flex-1 px-4 mt-4 space-y-1">
                <div class="px-4 py-3 text-slate-500"><i class="fas fa-th-large w-5 mr-3"></i>Dashboard</div>
                <div class="px-4 py-3 bg-blue-50 text-blue-600 rounded-xl font-semibold"><i class="fas fa-box w-5 mr-3"></i>Data Produk</div>
            </nav>
        </aside>

        <div class="fixed inset-0 bg-black/30 backdrop-blur-[1px] z-50 flex items-center justify-center p-4">
            
            <div class="bg-white w-full max-w-lg rounded-[32px] shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
                <div class="p-10">
                    <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-8">
                        Tambah & Edit Kategori
                    </h2>
                    
                    <form class="space-y-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-800 uppercase tracking-widest block ml-1">
                                Nama Kategori
                            </label>
                            <input 
                                type="text" 
                                placeholder="BESI & BAJA" 
                                class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-600 font-medium focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all placeholder:text-slate-300"
                            >
                        </div>

                        <div class="flex items-center justify-center gap-3 pt-6">
                            <button 
                                type="button" 
                                class="flex-1 py-3 px-6 bg-slate-100 hover:bg-slate-200 text-slate-800 text-sm font-bold rounded-xl transition-colors"
                            >
                                Batal
                            </button>
                            <button 
                                type="submit" 
                                class="flex-1 py-3 px-6 bg-[#2d46b9] hover:bg-blue-800 text-white text-sm font-bold rounded-xl shadow-lg shadow-blue-200 transition-all"
                            >
                                Simpan
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
