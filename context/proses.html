<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockInfo - Proses</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#f8fafc] text-[#1e293b]">

    <div class="flex min-h-screen">
        <aside class="w-64 bg-white border-r border-slate-200 flex flex-col fixed h-screen z-10">
            <div class="p-6 flex items-center gap-3">
                <div class="bg-[#1e40af] p-2 rounded-lg text-white">
                    <i class="fas fa-warehouse text-xl"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg leading-tight">StockInfo</h1>
                    <p class="text-[10px] text-slate-400 uppercase tracking-wider font-semibold">Warehouse Admin</p>
                </div>
            </div>

            <nav class="flex-1 px-4 space-y-1 mt-4">
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 rounded-xl transition-all">
                    <i class="fas fa-th-large w-5"></i>
                    <span class="text-sm font-medium">Dashboard</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 rounded-xl transition-all">
                    <i class="fas fa-box w-5"></i>
                    <span class="text-sm font-medium">Data Produk</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 rounded-xl transition-all">
                    <i class="fas fa-exchange-alt w-5"></i>
                    <span class="text-sm font-medium">Stock</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 rounded-xl transition-all">
                    <i class="fas fa-clipboard-check w-5"></i>
                    <span class="text-sm font-medium">Stock Opname</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 rounded-xl transition-all">
                    <i class="fas fa-user-friends w-5"></i>
                    <span class="text-sm font-medium">Supplier</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 rounded-xl transition-all">
                    <i class="fas fa-file-import w-5"></i>
                    <span class="text-sm font-medium">Transaksi Masuk</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 rounded-xl transition-all">
                    <i class="fas fa-chart-line w-5"></i>
                    <span class="text-sm font-medium">Laporan</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-600 rounded-xl transition-all">
                    <i class="fas fa-sync-alt w-5"></i>
                    <span class="text-sm font-semibold">Proses</span>
                </a>
            </nav>

            <div class="p-4 border-t border-slate-100">
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 rounded-xl transition-all">
                    <i class="fas fa-cog w-5"></i>
                    <span class="text-sm font-medium">Pengaturan</span>
                </a>
            </div>
        </aside>

        <main class="flex-1 ml-64">
            <header class="bg-white/80 backdrop-blur-md border-b border-slate-200 px-8 py-4 flex justify-between items-center sticky top-0 z-10">
                <div class="relative w-96">
                    <i class="fas fa-search absolute left-0 top-1/2 -translate-y-1/2 text-slate-300 text-sm"></i>
                </div>
                <div class="flex items-center gap-6">
                    <button class="relative text-slate-400 hover:text-slate-600">
                        <i class="far fa-bell text-lg"></i>
                        <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
                    </button>
                    <div class="flex items-center gap-3 pl-6 border-l border-slate-200">
                        <div class="text-right">
                            <p class="text-sm font-bold text-slate-800">Alex Rivera</p>
                            <p class="text-[10px] text-slate-400 font-semibold">Admin Level 4</p>
                        </div>
                        <div class="w-10 h-10 rounded-xl bg-slate-200 overflow-hidden">
                            <img src="https://ui-avatars.com/api/?name=Alex+Rivera&background=0D8ABC&color=fff" alt="Avatar">
                        </div>
                    </div>
                </div>
            </header>

            <div class="p-8 space-y-8">
                <div class="bg-[#7c4335] rounded-3xl p-8 text-white relative overflow-hidden shadow-xl shadow-orange-900/10">
                    <div class="relative z-10 flex items-center gap-6">
                        <div class="bg-white/20 p-4 rounded-2xl backdrop-blur-md">
                            <i class="fas fa-archive text-3xl"></i>
                        </div>
                        <div>
                            <h2 class="text-2xl font-bold">Proses</h2>
                            <div class="flex items-center gap-2 text-orange-100 text-xs mt-1">
                                <i class="fas fa-home"></i>
                                <i class="fas fa-chevron-right text-[8px]"></i>
                                <span class="uppercase tracking-wider font-bold text-white">Proses</span>
                            </div>
                        </div>
                    </div>
                    <i class="fas fa-file-alt absolute -right-8 -bottom-10 text-[180px] opacity-10 rotate-12"></i>
                </div>

                <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden p-6 space-y-6">
                    <div class="flex items-center justify-between gap-4">
                        <div class="flex flex-1 items-center gap-3 max-w-2xl">
                            <div class="relative flex-1">
                                <input type="text" placeholder="Cari Supplier..." class="w-full px-5 py-3 bg-[#f1f5f9] border-none rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-400">
                            </div>
                            <button class="w-11 h-11 flex items-center justify-center bg-white border border-slate-200 rounded-xl text-slate-400 hover:bg-slate-50 transition-all">
                                <i class="fas fa-search"></i>
                            </button>
                        </div>
                        <button class="bg-[#2d46b9] hover:bg-blue-800 text-white px-8 py-3 rounded-xl text-sm font-bold flex items-center gap-3 shadow-lg shadow-blue-200 transition-all">
                            <i class="fas fa-user-plus"></i>
                            Tambah
                        </button>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead>
                                <tr class="bg-[#2d46b9] text-white text-[10px] font-black uppercase tracking-widest text-left">
                                    <th class="px-6 py-4 rounded-tl-2xl">No</th>
                                    <th class="px-6 py-4 text-center">Nama Barang</th>
                                    <th class="px-6 py-4 text-center">No. Surat Jalan</th>
                                    <th class="px-6 py-4 text-center">Status</th>
                                    <th class="px-6 py-4 text-center">Kategori</th>
                                    <th class="px-6 py-4 text-center rounded-tr-2xl">Aksi</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-50">
                                <script>
                                    const rows = [1, 2, 3];
                                    document.write(rows.map(i => `
                                        <tr class="hover:bg-slate-50 transition-colors">
                                            <td class="px-6 py-8 text-sm font-bold text-slate-800">01</td>
                                            <td class="px-6 py-8 text-sm text-slate-600 font-medium text-center">Besi & Baja</td>
                                            <td class="px-6 py-8 text-sm text-slate-600 font-medium text-center uppercase tracking-tight">DO/2025/001</td>
                                            <td class="px-6 py-8 text-sm text-slate-600 font-medium text-center">On-Going</td>
                                            <td class="px-6 py-8 text-center">
                                                <span class="px-4 py-1.5 bg-[#f3e8ff] text-[#9333ea] text-[10px] font-black uppercase rounded-full">Construction</span>
                                            </td>
                                            <td class="px-6 py-8">
                                                <div class="flex justify-center gap-3">
                                                    <button class="p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-slate-400 hover:text-blue-600 hover:bg-blue-50 transition-all">
                                                        <i class="far fa-edit text-sm"></i>
                                                    </button>
                                                    <button class="p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-slate-400 hover:text-red-600 hover:bg-red-50 transition-all">
                                                        <i class="far fa-trash-alt text-sm"></i>
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    `).join(''));
                                </script>
                            </tbody>
                        </table>
                    </div>

                    <div class="pt-6 flex items-center justify-between">
                        <button class="px-4 py-2 border border-slate-200 rounded-xl text-xs font-bold text-slate-400 hover:bg-slate-50 transition-all">Sebelumnya</button>
                        <div class="flex items-center gap-2">
                            <button class="w-8 h-8 flex items-center justify-center rounded-lg bg-[#0038a8] text-white text-xs font-bold shadow-md">1</button>
                            <button class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-100 text-slate-500 text-xs font-bold transition-all">2</button>
                            <button class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-100 text-slate-500 text-xs font-bold transition-all">3</button>
                            <span class="text-slate-300 text-xs mx-1 font-bold">...</span>
                            <button class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-100 text-slate-500 text-xs font-bold transition-all">129</button>
                        </div>
                        <button class="px-4 py-2 border border-slate-200 rounded-xl text-xs font-bold text-slate-700 hover:bg-slate-50 transition-all">Selanjutnya</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
