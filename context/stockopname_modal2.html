<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockInfo - Input Stok Opname</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#f8fafc] text-[#1e293b] overflow-hidden">

    <div class="flex min-h-screen">
        <aside class="w-64 bg-white border-r border-slate-200 flex flex-col fixed h-screen z-10 blur-[1px] opacity-60">
            <div class="p-6 flex items-center gap-3">
                <div class="bg-[#1e40af] p-2 rounded-lg text-white">
                    <i class="fas fa-warehouse text-xl"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg leading-tight">StockInfo</h1>
                    <p class="text-[10px] text-slate-400 uppercase tracking-wider font-semibold">Warehouse Admin</p>
                </div>
            </div>

            <nav class="flex-1 px-4 space-y-1 mt-4">
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 rounded-xl transition-all">
                    <i class="fas fa-th-large w-5"></i>
                    <span class="text-sm font-medium">Dashboard</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 rounded-xl transition-all">
                    <i class="fas fa-box w-5"></i>
                    <span class="text-sm font-medium">Data Produk</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 rounded-xl transition-all">
                    <i class="fas fa-exchange-alt w-5"></i>
                    <span class="text-sm font-medium">Stock</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-600 hover:bg-slate-50 rounded-xl transition-all">
                    <i class="fas fa-clipboard-check w-5"></i>
                    <span class="text-sm font-medium">Stock Opname</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 rounded-xl transition-all">
                    <i class="fas fa-user-friends w-5"></i>
                    <span class="text-sm font-medium">Supplier</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 rounded-xl transition-all">
                    <i class="fas fa-file-import w-5"></i>
                    <span class="text-sm font-medium">Transaksi Masuk</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 rounded-xl transition-all">
                    <i class="fas fa-chart-line w-5"></i>
                    <span class="text-sm font-medium">Laporan</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 rounded-xl transition-all">
                    <i class="fas fa-sync-alt w-5"></i>
                    <span class="text-sm font-medium">Proses</span>
                </a>
            </nav>

            <div class="p-4 border-t border-slate-100">
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 rounded-xl transition-all">
                    <i class="fas fa-cog w-5"></i>
                    <span class="text-sm font-medium">Pengaturan</span>
                </a>
            </div>
        </aside>

        <main class="flex-1 ml-64 p-8 blur-[2px] opacity-40">
            <div class="bg-orange-600 rounded-3xl p-8 h-48 mb-8"></div>
            <div class="bg-white rounded-3xl border border-slate-200 h-96"></div>
        </main>

        <div class="fixed inset-0 bg-black/40 backdrop-blur-[2px] z-50 flex items-center justify-center p-4">
            
            <div class="bg-white w-full max-w-3xl rounded-[32px] shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
                <div class="p-8 md:p-10">
                    
                    <h2 class="text-[11px] font-black text-slate-400 uppercase tracking-[0.25em] mb-8">
                        Input Stok Opname
                    </h2>
                    
                    <form action="#" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                            
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-slate-800 uppercase tracking-widest block ml-1">
                                    Nama Produk
                                </label>
                                <input 
                                    type="text" 
                                    value="Besi Beton Polos 10mm (12m)"
                                    class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-700 font-medium focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all"
                                >
                            </div>

                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-slate-800 uppercase tracking-widest block ml-1">
                                    No. SKU
                                </label>
                                <div class="relative">
                                    <select class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-700 font-medium appearance-none focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all">
                                        <option>ST-BPN-10-001</option>
                                    </select>
                                    <i class="fas fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 text-xs pointer-events-none"></i>
                                </div>
                            </div>

                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-slate-800 uppercase tracking-widest block ml-1">
                                    Jumlah Stok
                                </label>
                                <input 
                                    type="number" 
                                    value="41"
                                    class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-700 font-medium focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all"
                                >
                            </div>

                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-slate-800 uppercase tracking-widest block ml-1">
                                    Jumlah Dilaporkan
                                </label>
                                <input 
                                    type="number" 
                                    value="35"
                                    class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-700 font-medium focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all"
                                >
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-800 uppercase tracking-widest block ml-1">
                                Keterangan
                            </label>
                            <textarea 
                                rows="4"
                                class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm text-slate-700 font-medium focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all resize-none"
                                placeholder="Tuliskan keterangan jika ada selisih stok..."
                            >barang ada yang rusak</textarea>
                        </div>

                        <div class="flex items-center justify-end gap-3 pt-4">
                            <button 
                                type="button" 
                                class="px-10 py-3.5 bg-slate-100 hover:bg-slate-200 text-slate-800 text-sm font-bold rounded-xl transition-colors"
                            >
                                Batal
                            </button>
                            <button 
                                type="submit" 
                                class="px-10 py-3.5 bg-[#2d46b9] hover:bg-blue-800 text-white text-sm font-bold rounded-xl shadow-lg shadow-blue-200 transition-all"
                            >
                                Simpan
                            </button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>

</body>
</html>
