<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockInfo - Tambah Periode Stok Opname</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Menghilangkan icon default date browser tertentu jika ingin custom look */
        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            opacity: 0.6;
            filter: invert(27%) sepia(51%) border-color(rgb(45, 70, 185));
        }
    </style>
</head>
<body class="bg-[#f8fafc] text-[#1e293b] overflow-hidden">

    <div class="flex min-h-screen blur-md pointer-events-none select-none">
        <aside class="w-64 bg-white border-r border-slate-200 flex flex-col fixed h-screen">
            <div class="p-6 flex items-center gap-3">
                <div class="bg-[#1e40af] p-2 rounded-lg text-white"><i class="fas fa-warehouse text-xl"></i></div>
                <div>
                    <h1 class="font-bold text-lg leading-tight">StockInfo</h1>
                    <p class="text-[10px] text-slate-400 uppercase tracking-wider font-semibold">Warehouse Admin</p>
                </div>
            </div>
            <nav class="flex-1 px-4 space-y-1 mt-4">
                <div class="flex items-center gap-3 px-4 py-3 text-blue-600 font-bold bg-blue-50 rounded-xl"><i class="fas fa-exchange-alt w-5"></i> Inventory</div>
            </nav>
        </aside>
        <main class="flex-1 ml-64 p-8">
            <div class="bg-white rounded-3xl border border-slate-200 h-screen"></div>
        </main>
    </div>

    <div class="fixed inset-0 bg-black/40 backdrop-blur-[2px] z-50 flex items-center justify-center p-4">
        
        <div class="bg-white w-full max-w-2xl rounded-[32px] shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
            <div class="p-8 md:p-10">
                
                <h2 class="text-[11px] font-black text-slate-400 uppercase tracking-[0.25em] mb-10">
                    Tambah Periode
                </h2>
                
                <form action="#" class="space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-800 uppercase tracking-widest block ml-1">
                                Tanggal Mulai
                            </label>
                            <input 
                                type="date" 
                                class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-700 font-medium focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all"
                            >
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-800 uppercase tracking-widest block ml-1">
                                Tanggal Selesai
                            </label>
                            <input 
                                type="date" 
                                class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-700 font-medium focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all"
                            >
                        </div>
                    </div>

                    <div class="space-y-3">
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <div class="relative flex items-center">
                                <input type="checkbox" class="peer h-5 w-5 cursor-pointer appearance-none rounded-md border border-slate-300 transition-all checked:bg-[#2d46b9] checked:border-[#2d46b9]" id="aktifkan">
                                <i class="fas fa-check absolute text-white text-[10px] left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 opacity-0 peer-checked:opacity-100"></i>
                            </div>
                            <span class="text-sm font-semibold text-slate-600 group-hover:text-slate-800 transition-colors">Aktifkan Langsung</span>
                        </label>
                        <p class="text-xs font-medium text-slate-400 ml-8 leading-relaxed">
                            Pastikan periode sebelumnya sudah selesai sebelum mengaktifkan periode ini.
                        </p>
                    </div>

                    <div class="flex items-center justify-end gap-3 pt-6">
                        <button 
                            type="button" 
                            class="px-10 py-3.5 bg-slate-100 hover:bg-slate-200 text-slate-800 text-sm font-bold rounded-xl transition-colors"
                        >
                            Batal
                        </button>
                        <button 
                            type="submit" 
                            class="px-10 py-3.5 bg-[#2d46b9] hover:bg-blue-800 text-white text-sm font-bold rounded-xl shadow-lg shadow-blue-200 transition-all"
                        >
                            Simpan
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>

</body>
</html>
