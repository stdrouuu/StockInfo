<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockInfo - Modal Proses</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#f8fafc] text-[#1e293b] overflow-hidden">

    <div class="flex min-h-screen blur-[2px] pointer-events-none select-none">
        <aside class="w-64 bg-white border-r border-slate-200 h-screen"></aside>
        <main class="flex-1 bg-slate-100"></main>
    </div>

    <div class="fixed inset-0 bg-black/40 backdrop-blur-[2px] z-50 flex items-center justify-center p-4">
        
        <div class="bg-white w-full max-w-2xl rounded-[32px] shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
            <div class="p-8 md:p-10">
                
                <h2 class="text-[11px] font-black text-slate-400 uppercase tracking-[0.25em] mb-10">
                    Tambah & Edit Proses
                </h2>
                
                <form action="#" class="space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                        
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-800 uppercase tracking-widest block ml-1">
                                Nama Barang
                            </label>
                            <input 
                                type="text" 
                                value="Besi & Baja"
                                class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-700 font-medium focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all"
                            >
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-800 uppercase tracking-widest block ml-1">
                                No Surat Jalan
                            </label>
                            <input 
                                type="text" 
                                value="DO/2025/001"
                                class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-700 font-medium focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all uppercase"
                            >
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-800 uppercase tracking-widest block ml-1">
                                Status
                            </label>
                            <input 
                                type="text" 
                                value="On-Going"
                                class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-700 font-medium focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all"
                            >
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-800 uppercase tracking-widest block ml-1">
                                Kategori
                            </label>
                            <div class="relative">
                                <select class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-700 font-medium appearance-none focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all">
                                    <option>Construction</option>
                                    <option>Raw Material</option>
                                    <option>Finishing</option>
                                </select>
                                <i class="fas fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 text-xs pointer-events-none"></i>
                            </div>
                        </div>

                    </div>

                    <div class="flex items-center justify-end gap-3 pt-4">
                        <button 
                            type="button" 
                            class="px-10 py-3.5 bg-slate-100 hover:bg-slate-200 text-slate-800 text-sm font-bold rounded-xl transition-colors"
                        >
                            Batal
                        </button>
                        <button 
                            type="submit" 
                            class="px-10 py-3.5 bg-[#2d46b9] hover:bg-blue-800 text-white text-sm font-bold rounded-xl shadow-lg shadow-blue-200 transition-all"
                        >
                            Simpan
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>

</body>
</html>
